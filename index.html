<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="lesson 11 is about responsive design" />
    <title>Lesson 11</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <a class="brand-logo" href="#">
          <img src="./src/images/Logo.png" alt="Travellian" />
        </a>
        <nav class="main-nav">
          <a href="#">Home</a>
          <a href="#">Explore</a>
          <a href="#">Travel</a>
          <a href="#">Blog</a>
          <a href="#">Pricing</a>
        </nav>
        <div class="header-right">
          <button class="header-action login">Login</button>
          <button class="header-action signup">Sign up</button>
        </div>
        <button class="menu-toggle" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero-content">
          <h1 class="hero-title">Start your unforgettable journey with us.</h1>
          <p class="hero-subtitle">
            The best travel for your jouney begins now
          </p>
        </div>

        <div class="hero-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <button class="dot-nav" aria-label="Previous slide">
            <img src="./src/images/Vector.png" alt="" />
          </button>
          <button class="dot-nav dot-nav--next" aria-label="Next slide">
            <img src="./src/images/Vector.png" alt="" />
          </button>
        </div>

        <div class="booking-bar">
          <div class="booking-field">
            <label for="destination">Destination</label>
            <input type="text" id="destination" value="Dubai" />
          </div>
          <div class="booking-field">
            <label for="person">Person</label>
            <select id="person">
              <option>1</option>
              <option selected>2</option>
              <option>3</option>
              <option>4+</option>
            </select>
          </div>
          <div class="booking-field">
            <label for="check-in">Check In</label>
            <input type="text" id="check-in" value="Sun, 17th Sep 2020" />
          </div>
          <div class="booking-field">
            <label for="check-out">Check Out</label>
            <input type="text" id="check-out" value="Tue, 17th Oct 2020" />
          </div>
          <button class="book-now">
            <span class="book-now-label">Book<br />Now</span>
            <span class="arrow">&rarr;</span>
          </button>
        </div>
      </section>
    </main>

  </body>
</html>
